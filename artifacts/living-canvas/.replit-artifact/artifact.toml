kind = "web"
previewPath = "/"
title = "Living Software Canvas"
version = "1.0.0"
id = "artifacts/living-canvas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23370

[services.development]
run = "pnpm --filter @workspace/living-canvas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/living-canvas", "run", "build" ]
publicDir = "artifacts/living-canvas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23370"
BASE_PATH = "/"
